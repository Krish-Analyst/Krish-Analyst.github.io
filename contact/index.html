<style>
  body { padding-top: 60px; min-height: 100vh; animation: fadeIn 0.5s ease-in; }

  .contact-container {
    max-width: 580px;
    margin: 0 auto;
    padding: 80px 40px;
  }

  .contact-container h1 {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    letter-spacing: -1px;
    animation: slideInUp 0.7s ease-out 0.1s backwards;
  }

  .contact-container .subtitle {
    font-size: 17px;
    color: var(--muted);
    margin-bottom: 48px;
    font-weight: 300;
    animation: slideInUp 0.7s ease-out 0.2s backwards;
  }

  .contact-links { display: flex; flex-direction: column; gap: 0; }

  .contact-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-top: 1px solid var(--border);
    transition: all 0.3s ease;
    animation: slideInUp 0.6s ease-out forwards;
    color: inherit;
    text-decoration: none;
  }

  .contact-link:nth-of-type(1) { animation-delay: 0.3s; }
  .contact-link:nth-of-type(2) { animation-delay: 0.4s; }

  .contact-link:last-child { border-bottom: 1px solid var(--border); }
  .contact-link:hover { opacity: 0.6; transform: translateX(8px); }

  .contact-link-label { font-size: 16px; font-weight: 500; }
  .contact-link-value { font-size: 15px; color: var(--muted); }

  @media (max-width: 600px) {
    .contact-container { padding-left: 20px; padding-right: 20px; }
  }
